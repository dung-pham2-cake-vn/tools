<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f1f3f5;
    color: #1a1d23;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 24px;
  }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
  .today-label { font-size: 12px; color: #6b7280; font-weight: 500; }

  /* ── Cards ── */
  .sprint-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 12px;
  }
  .sprint-card.current { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.07); }

  /* card header */
  .card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .sprint-num { font-size: 15px; font-weight: 700; }
  .badge {
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .badge.current  { background: #eff6ff; color: #2563eb; }
  .badge.upcoming { background: #f3f4f6; color: #6b7280; }
  .days-info { margin-left: auto; font-size: 12px; color: #6b7280; }
  .days-info strong { color: #1a1d23; }

  /* ── Timeline (current sprint only) ── */
  .timeline-area {
    margin: 0 0 20px;
    padding: 14px 0 52px;
    position: relative;
  }

  .rail {
    position: relative;
    height: 4px;
    background: #e5e7eb;
    border-radius: 2px;
  }
  .rail-fill {
    position: absolute;
    top: 0; left: 0; height: 100%;
    background: #2563eb; border-radius: 2px;
  }

  /* milestone dot on rail */
  .ms {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
  }
  .ms-dot {
    width: 11px; height: 11px;
    border-radius: 50%; background: #fff;
    border: 2px solid #d1d5db;
    position: relative; z-index: 2;
  }
  .ms.done .ms-dot { border-color: #2563eb; background: #2563eb; }

  /* labels — all below the rail */
  .ms-lbl {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    text-align: center; white-space: nowrap;
    top: calc(100% + 10px);
  }

  .ms-lbl span.name {
    display: block;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
    color: #9ca3af; margin-bottom: 1px;
  }
  .ms-lbl span.date {
    display: block;
    font-size: 11px; font-weight: 500; color: #374151;
  }
  .ms.done .ms-lbl span.name,
  .ms.done .ms-lbl span.date { color: #9ca3af; }

  /* today */
  .today-mk {
    position: absolute;
    top: 50%; transform: translate(-50%, -50%);
    z-index: 10;
  }
  .today-dot {
    width: 14px; height: 14px;
    border-radius: 50%; background: #2563eb;
    border: 2.5px solid #fff;
    box-shadow: 0 0 0 2px #2563eb, 0 2px 8px rgba(37,99,235,.35);
  }
  .today-pill {
    position: absolute;
    bottom: calc(100% + 7px);
    left: 50%; transform: translateX(-50%);
    background: #2563eb; color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 4px;
    white-space: nowrap;
  }
  .today-pill::after {
    content: '';
    position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 4px solid transparent; border-top-color: #2563eb;
  }

  /* ── Stats row ── */
  .stats-row {
    display: flex; gap: 24px;
    padding-top: 12px;
    border-top: 1px solid #f3f4f6;
  }
  .stat { display: flex; flex-direction: column; gap: 3px; }
  .stat-lbl { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .stat-val { font-size: 13px; font-weight: 600; color: #1a1d23; }
  .stat-val.blue { color: #2563eb; }

  /* ── Info cards (next / upcoming) ── */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(4, auto) 1fr;
    gap: 4px 32px;
    align-items: start;
  }
  .info-item { display: flex; flex-direction: column; gap: 4px; }
  .info-lbl { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .info-val { font-size: 14px; font-weight: 600; color: #374151; }

  /* workday badge */
  .workday-note {
    margin-left: auto;
    align-self: center;
    font-size: 11px; color: #6b7280;
    background: #f3f4f6;
    padding: 4px 10px; border-radius: 6px;
  }
  .workday-note strong { color: #1a1d23; }
</style>
</head>
<body>

<div class="header">
  <h1>Lending — Sprint Calendar</h1>
  <span class="today-label" id="todayLabel"></span>
</div>

<div id="cards"></div>

<script>
const SPRINTS = [
  [182,"2026-02-24","2026-03-09","2026-03-12"],
  [183,"2026-03-10","2026-03-23","2026-03-26"],
  [184,"2026-03-24","2026-04-06","2026-04-09"],
  [185,"2026-04-07","2026-04-20","2026-04-23"],
  [186,"2026-04-21","2026-05-04","2026-05-07"],
  [187,"2026-05-05","2026-05-18","2026-05-21"],
  [188,"2026-05-19","2026-06-01","2026-06-04"],
  [189,"2026-06-02","2026-06-15","2026-06-18"],
  [190,"2026-06-16","2026-06-29","2026-07-02"],
  [191,"2026-06-30","2026-07-13","2026-07-16"],
  [192,"2026-07-14","2026-07-27","2026-07-30"],
  [193,"2026-07-28","2026-08-10","2026-08-13"],
  [194,"2026-08-11","2026-08-24","2026-08-27"],
  [195,"2026-08-25","2026-09-07","2026-09-10"],
  [196,"2026-09-08","2026-09-21","2026-09-24"],
  [197,"2026-09-22","2026-10-05","2026-10-08"],
  [198,"2026-10-06","2026-10-19","2026-10-22"],
  [199,"2026-10-20","2026-11-02","2026-11-05"],
  [200,"2026-11-03","2026-11-16","2026-11-19"],
  [201,"2026-11-17","2026-11-30","2026-12-03"],
  [202,"2026-12-01","2026-12-14","2026-12-17"],
  [203,"2026-12-15","2026-12-28","2026-12-31"],
  [204,"2026-12-29","2027-01-11","2027-01-14"],
];

function parseD(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmt(d) {
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
}
function fmtFull(d) {
  return d.toLocaleDateString('en-GB', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
}

// workdays between two dates (excl. Sat/Sun), end inclusive
function workdays(a, b) {
  let count = 0, cur = new Date(a);
  while (cur <= b) {
    const wd = cur.getDay();
    if (wd !== 0 && wd !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

// workdays remaining from today to b (inclusive), skipping today if it's a weekend
function workdaysLeft(today, b) {
  if (today > b) return 0;
  return workdays(today, b);
}

const today = (() => {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
})();

document.getElementById('todayLabel').textContent = 'Today · ' + fmtFull(today);

// find current sprint
let currentIdx = -1;
for (let i = 0; i < SPRINTS.length; i++) {
  const s = parseD(SPRINTS[i][1]), d = parseD(SPRINTS[i][3]);
  if (today >= s && today <= d) { currentIdx = i; break; }
}
if (currentIdx === -1) {
  for (let i = 0; i < SPRINTS.length; i++) {
    if (parseD(SPRINTS[i][1]) > today) { currentIdx = i; break; }
  }
}
if (currentIdx === -1) currentIdx = SPRINTS.length - 1;

const indices = [];
for (let i = currentIdx; i < Math.min(currentIdx + 3, SPRINTS.length); i++) indices.push(i);

const container = document.getElementById('cards');

indices.forEach((idx, cardNum) => {
  const s      = SPRINTS[idx];
  const isCur  = idx === currentIdx;
  const startD = parseD(s[1]);
  const endD   = parseD(s[2]);
  const depD   = parseD(s[3]);

  const wdDevTotal   = workdays(startD, endD);
  const wdDevLeft    = workdaysLeft(today, endD);
  const wdToDepoly   = workdaysLeft(today, depD);
  const devProgressPct = Math.min(Math.max(
    Math.round((workdays(startD, today <= startD ? startD : today) - (today <= startD ? 1 : 0)) / wdDevTotal * 100), 0), 100);

  const statusLabel = isCur ? 'Current' : (cardNum === 1 ? 'Next' : 'Upcoming');
  const badgeCls    = isCur ? 'current' : 'upcoming';

  let daysInfoHTML = '';
  if (isCur) {
    if (today <= endD) {
      daysInfoHTML = `<span class="days-info"><strong>${wdDevLeft}</strong> working days left in dev</span>`;
    } else {
      daysInfoHTML = `<span class="days-info">Dev done · <strong>${wdToDepoly}</strong> working days to deploy</span>`;
    }
  }

  const card = document.createElement('div');
  card.className = 'sprint-card' + (isCur ? ' current' : '');

  // ── Head
  const headHTML = `
    <div class="card-head">
      <span class="sprint-num">Sprint ${s[0]}</span>
      <span class="badge ${badgeCls}">${statusLabel}</span>
      ${daysInfoHTML}
    </div>`;

  if (isCur) {
    // ── Timeline
    const totalMs = depD - startD;
    function pct(d) { return Math.min(Math.max((d - startD) / totalMs, 0), 1) * 100; }

    const onRail    = today >= startD && today <= depD;
    const fillWidth = today > depD ? 100 : today < startD ? 0 : pct(today);

    const milestones = [
      { name: 'Start',   date: startD },
      { name: 'End dev', date: endD   },
      { name: 'Deploy',  date: depD   },
    ];

    const msHTML = milestones.map(m => {
      const done = today >= m.date;
      const p    = pct(m.date);
      const lbl  = `<span class="name">${m.name}</span><span class="date">${fmt(m.date)}</span>`;
      return `
        <div class="ms ${done ? 'done' : ''}" style="left:${p}%">
          <div class="ms-dot"></div>
          <div class="ms-lbl">${lbl}</div>
        </div>`;
    }).join('');

    const todayHTML = onRail ? `
      <div class="today-mk" style="left:${pct(today)}%">
        <div class="today-pill">Today</div>
        <div class="today-dot"></div>
      </div>` : '';

    const timelineHTML = `
      <div class="timeline-area">
        <div class="rail">
          <div class="rail-fill" style="width:${fillWidth}%"></div>
          ${msHTML}
          ${todayHTML}
        </div>
      </div>`;

    const statsHTML = `
      <div class="stats-row">
        <div class="stat"><span class="stat-lbl">Start dev</span><span class="stat-val">${fmt(startD)}</span></div>
        <div class="stat"><span class="stat-lbl">End dev</span><span class="stat-val">${fmt(endD)}</span></div>
        <div class="stat"><span class="stat-lbl">Deploy</span><span class="stat-val">${fmt(depD)}</span></div>
        <div class="stat"><span class="stat-lbl">Dev workdays</span><span class="stat-val">${wdDevTotal}d</span></div>
        <div class="stat"><span class="stat-lbl">Dev progress</span><span class="stat-val blue">${devProgressPct}%</span></div>
      </div>`;

    card.innerHTML = headHTML + timelineHTML + statsHTML;

  } else {
    // ── Simple info grid
    const wdDev = workdays(startD, endD);
    const infoHTML = `
      <div class="info-grid">
        <div class="info-item"><span class="info-lbl">Start dev</span><span class="info-val">${fmt(startD)}</span></div>
        <div class="info-item"><span class="info-lbl">End dev</span><span class="info-val">${fmt(endD)}</span></div>
        <div class="info-item"><span class="info-lbl">Deploy</span><span class="info-val">${fmt(depD)}</span></div>
        <div class="info-item"><span class="info-lbl">Dev workdays</span><span class="info-val">${wdDev}d</span></div>
        <div class="workday-note">Starts in <strong>${workdaysLeft(today, startD)}</strong> working days</div>
      </div>`;
    card.innerHTML = headHTML + infoHTML;
  }

  container.appendChild(card);
});
</script>
</body>
</html>
